<div class="chat-window">
  <div class="chat-header">
    <div class="header-content">
      <div class="user-info">
        <i *ngIf="isMobile" (click)="goBack()" class="material-icons back-button">arrow_back</i>
        <worky-avatar *ngIf="!isLoadingUser" [size]="40" [name]="otherUserName" [img]="otherUserAvatar">
        </worky-avatar>
        <div *ngIf="isLoadingUser" class="avatar-skeleton"></div>
        <div class="user-details">
          <h3 *ngIf="!isLoadingUser" class="user-name">{{ otherUserName }}</h3>
          <div *ngIf="isLoadingUser" class="name-skeleton"></div>
          <div *ngIf="!isLoadingUser && otherUserInfo" class="user-status-container">
            <span *ngIf="otherUserStatus === 'online'" class="user-status-indicator status-online"></span>
            <span *ngIf="otherUserStatus === 'inactive'" class="user-status-indicator status-inactive"></span>
            <span *ngIf="otherUserStatus === 'offLine'" class="user-status-indicator status-offline"></span>
            <span class="user-status-text">
              <span *ngIf="otherUserStatus === 'online'">{{ 'messages.online' | workyTranslations }}</span>
              <span *ngIf="otherUserStatus === 'inactive'">{{ 'messages.inactive' | workyTranslations }}</span>
              <span *ngIf="otherUserStatus === 'offLine'">{{ 'messages.offline' | workyTranslations }}</span>
              <span *ngIf="!otherUserStatus">{{ 'messages.offline' | workyTranslations }}</span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <worky-chat-list [messages]="messages" [currentUserId]="currentUserId" [otherUserName]="otherUserName"
    [otherUserAvatar]="otherUserAvatar" [isLoading]="isLoading" [loadingMoreMessages]="loadingMoreMessages"
    [hasMoreMessages]="hasMoreMessages" [otherUserTyping]="otherUserTyping" [decodedToken]="decodedToken"
    [editingMessageId]="editingMessageId" [editingMessageContent]="editingMessageContent"
    (scrollUp)="loadMoreMessages(currentPage + 1)" (reply)="startReplyToMessage($event)"
    (edit)="startEditMessage($event)" (delete)="deleteMessage($event)"
    (saveEdit)="saveEditedMessage($event.id, undefined)" (cancelEditEvent)="cancelEdit()"
    (openUrlEvent)="openUrl($event)" (messageAction)="handleMessageAction($event.action, $event.message)"
    (editingContentChange)="editingMessageContent = $event">
  </worky-chat-list>

  <worky-chat-input [isSending]="isSending" [replyingToMessage]="replyingToMessage" [otherUserId]="otherUserId"
    [decodedToken]="decodedToken" [otherUserName]="otherUserName" [messageContent]="messageContent"
    (sendMessage)="sendMessage($event.type, $event.content, $event.urlFile)" (typing)="handleTyping($event)"
    (cancelReplyEvent)="cancelReply()" (openGifSearchEvent)="openGifSearch()" (openUploadModalEvent)="openUploadModal()"
    (messageContentChange)="messageContent = $event">
  </worky-chat-input>
</div>
