<div class="content-navbar" *ngIf="!isMobile">
  <nav class="worky-navbar">
      <!-- Left elements -->
      <div class="worky-brand">
        <!-- Brand Logo-->
        <a [routerLink]="['/']" *ngIf="logoUrl !== ''">
          <img class="worky-logo" [src]="getNormalizedLogoUrl(logoUrl)" [alt]="title" style="margin-top: 2px;" loading="lazy" (error)="logoUrl = ''">
        </a>
        <!-- Search -->
        <form
          class="worky-search"
          (ngSubmit)="search($event)">
          <div class="search-container">
            <span class="material-icons search-icon">search</span>
            <input
              type="search"
              class="form-control"
              placeholder="{{ 'navbar.search' | workyTranslations }}"
              [(ngModel)]="searchTerm"
              (input)="onInputChange($event)"
              autocomplete="off"
              name="searchTerm"
            />
          </div>
        </form>

        <ul *ngIf="users.length > 0" class="search-results">
          <li *ngFor="let user of users" (click)="viewProfile(user._id)">
            <worky-avatar
              [img]="user.avatar"
              [size]="30"
              [name]="user.name + ' ' + user.lastName"
            ></worky-avatar>
            {{ user.name }} {{ user.lastName }} ({{ user.username }})
          </li>
        </ul>

        <!-- Nearby people section -->
        <div *ngIf="nearbyUsers.length > 0" class="search-results" style="border-top:1px solid var(--worky-border);">
          <div style="padding:4px 12px;font-size:11px;font-weight:600;color:var(--worky-text-secondary);text-transform:uppercase;letter-spacing:.05em;">
            {{ 'explore.nearbyUsers' | workyTranslations }}
          </div>
          <li *ngFor="let user of nearbyUsers" (click)="viewProfile(user._id)">
            <worky-avatar
              [img]="user.avatar"
              [size]="30"
              [name]="user.name + ' ' + user.lastName"
            ></worky-avatar>
            {{ user.name }} {{ user.lastName }}
            <span *ngIf="user.isPremium" style="font-size:10px;color:#f59e0b;margin-left:4px;">⭐</span>
            <span *ngIf="user.discoveryCity" style="font-size:11px;color:var(--worky-text-secondary);margin-left:4px;">({{ user.discoveryCity }})</span>
          </li>
        </div>

      </div>
      <!-- Center elements -->
      <worky-menu-component *ngIf="!isMobile"></worky-menu-component>
      <!-- Right elements -->

      <div class="worky-profile" *ngIf="!isMobile">
        <!-- Messages -->
        <a [routerLink]="['/events']" class="item-navbar-actions" [title]="'events.title' | workyTranslations">
          <span class="material-symbols-rounded navbar-action-icon">calendar_month</span>
        </a>
        <a [routerLink]="['/groups']" class="item-navbar-actions" [title]="'groups.title' | workyTranslations">
          <span class="material-symbols-rounded navbar-action-icon">groups</span>
        </a>
        <a [routerLink]="['/messages']" class="item-navbar-actions">
          <worky-dropdown
            icon="chat"
            [badgeValue]="unreadMessages > 0 ? unreadMessages : null"
            [isMenu]="false"
            [badge]="true">
          </worky-dropdown>
        </a>
        <!-- Notification -->
        <worky-dropdown class="item-navbar-actions"
          icon="notifications"
          [badgeValue]="notifications > 0 ? notifications : null"
          (click)="toggleNotificationsPanel()"
          [isMenu]=false
          [badge]=true>
        </worky-dropdown>
        <!-- Profile -->
        <worky-dropdown
          [badge]=false
          img="avatar"
          [dataLink]="dataLinkProfile"
          (linkClicked)="handleLinkClicked($event)">
        </worky-dropdown>
      </div>


  </nav>
</div>

<div class="content-navbar" *ngIf="isMobile"
  [class.sticky-content]="!isMessages"
  [class.scrolledTop]="scrolledTop && !isMessages">
  <nav class="worky-navbar">
      <!-- Mobile Search Bar -->
      <div class="worky-brand-mobile">
        <!-- Brand Logo -->
        <a [routerLink]="['/']" *ngIf="logoUrl !== ''">
          <img class="worky-logo-mobile" [src]="getNormalizedLogoUrl(logoUrl)" [alt]="title" loading="lazy" (error)="logoUrl = ''">
        </a>
        <!-- Search -->
        <form
          class="worky-search-mobile"
          (ngSubmit)="search($event)">
          <div class="search-container-mobile">
            <span class="material-icons search-icon-mobile">search</span>
            <input
              type="search"
              class="form-control-mobile"
              placeholder="{{ 'navbar.search' | workyTranslations }}"
              [(ngModel)]="searchTerm"
              (input)="onInputChange($event)"
              autocomplete="off"
              name="searchTerm"
            />
          </div>
        </form>
      </div>

      <!-- Mobile Navigation -->
      <div class="worky-profile-mobile">
        <worky-menu-component></worky-menu-component>
        <!-- Messages -->
        <a [routerLink]="['/messages']">
          <worky-dropdown
            icon="chat"
            [badgeValue]="unreadMessages > 0 ? unreadMessages : null"
            [isMenu]="false"
            [badge]="true">
          </worky-dropdown>
        </a>
        <!-- Notification -->
        <worky-dropdown
          icon="notifications"
          [badgeValue]="notifications > 0 ? notifications : null"
          (click)="toggleNotificationsPanel()"
          [isMenu]=false
          [badge]=true>
        </worky-dropdown>
        <!-- Profile -->
        <worky-dropdown
          [badge]=false
          img="avatar"
          [size]="30"
          [dataLink]="dataLinkProfile"
          (linkClicked)="handleLinkClicked($event)">
        </worky-dropdown>
      </div>

      <!-- Mobile Search Results -->
      <ul *ngIf="users.length > 0" class="search-results-mobile">
        <li *ngFor="let user of users" (click)="viewProfile(user._id)">
          <worky-avatar
            [img]="user.avatar"
            [size]="30"
            [name]="user.name + ' ' + user.lastName"
          ></worky-avatar>
          {{ user.name }} {{ user.lastName }} ({{ user.username }})
        </li>
      </ul>
  </nav>
</div>

<worky-notifications-panel></worky-notifications-panel>
