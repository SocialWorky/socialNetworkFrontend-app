<div class="container-user-online">
  <h3 class="user-online-title">{{ 'userOnline.title' | workyTranslations }}</h3>

  @if (isLoading()) {
    <div class="user-online-loading">
      <div class="loading-spinner"></div>
      <span>Cargando usuarios...</span>
    </div>
  }

  @if (!isLoading() && filteredUsers().length > 0) {
    <div class="user-online-content">
      @for (user of filteredUsers(); track user.id) {
        <div class="user-online-item" 
             (click)="goToProfile(user.id)"
             [title]="user.name + ' - ' + (user.status === 'online' ? 'Online' : 'Inactivo')">
          
          <worky-avatar
              [size]="35"
              [name]="user.name"
              [img]="user.avatar"
              class="user-online-avatar">
          </worky-avatar>

          <div class="user-online-status-indicator"
               [class.status-online]="user.status === 'online'"
               [class.status-inactive]="user.status === 'inactive'"
               [title]="user.status === 'online' ? 'Online' : 'Inactivo'">
          </div>
        </div>
      }
    </div>
  }

  @if (!isLoading() && filteredUsers().length === 0) {
    <div class="user-online-empty">
      <i class="material-icons">people_outline</i>
      <span>No hay usuarios conectados</span>
    </div>
  }
</div>
