<div *ngIf="isLoading" class="gallery"
  [ngClass]="{
    'single': (publication?.media?.length ?? 0) === 1,
    'two-images': (publication?.media?.length ?? 0) === 2,
    'three-images': (publication?.media?.length ?? 0) === 3,
    'four-images': (publication?.media?.length ?? 0) === 4,
    'five-images': (publication?.media?.length ?? 0) === 5,
    'more-five-images': (publication?.media?.length ?? 0) > 5
  }">
  <div *ngFor="let _ of [].constructor((publication?.media?.length ?? 0) > 5 ? 5 : (publication?.media?.length ?? 0)); let i = index" class="gallery-item skeleton-item">
    <worky-image-skeleton
      width="100%"
      height="100%"
      [rounded]="false"
      [mediaType]="isVideoUrl(publication?.media?.[i]?.url ?? '') ? 'video' : 'image'">
    </worky-image-skeleton>
  </div>
</div>

<div class="gallery-lightbox-container" *ngIf="!isLoading && images && images.length > 0">
  <div class="gallery"
    [ngClass]="{
      'single': images.length === 1,
      'two-images': images.length === 2,
      'three-images': images.length === 3,
      'four-images': images.length === 4,
      'five-images': images.length === 5,
      'more-five-images': images.length > 5,
      'has-video': hasVideo
    }">
    <ng-container *ngFor="let image of images.slice(0, 5); let i = index">
      <div class="gallery-item" (click)="openViewMedia(image)"
          [attr.data-content]="(i === 4 && images.length > 5) ? '+ ' + (images.length - 5) : null">
        <ng-container *ngIf="isImageUrl(image.urlCompressed)">
          <worky-image 
            [src]="getNormalizedImageUrl(image.urlCompressed)" 
            alt="Image" 
            [publicationId]="publication?._id"
            [commentId]="comment?._id"
            [mediaId]="image._id"
            [imageType]="type === 'publication' ? 'publication' : (type === 'comment' ? 'media' : 'media')"
            (load)="onImageLoad()" 
            (error)="onImageError($event)">
          </worky-image>
        </ng-container>

        <ng-container *ngIf="isVideoUrl(image.urlCompressed)">
          <!-- Inline (Facebook-style) playback. Clicks stay on the player so the publication
               does NOT expand; the modal opens only via the explicit expand button. The first
               video autoplays muted when scrolled into view; the rest play on user action. -->
          <div class="inline-video-wrapper" (click)="$event.stopPropagation()">
            <worky-optimized-video
              [src]="getNormalizedImageUrl(image.urlCompressed)"
              [poster]="getNormalizedImageUrl(image.urlThumbnail)"
              [controls]="true"
              [muted]="i === firstVideoIndex"
              [autoplayWhenVisible]="i === firstVideoIndex"
              [loop]="false"
              preload="metadata"
              (loaded)="onImageLoad()">
            </worky-optimized-video>
            <button class="video-expand-btn" type="button"
                    (click)="$event.stopPropagation(); openViewMedia(image)"
                    aria-label="Expandir video">
              <span class="material-icons">fullscreen</span>
            </button>
          </div>
        </ng-container>
      </div>
    </ng-container>
  </div>
</div>
