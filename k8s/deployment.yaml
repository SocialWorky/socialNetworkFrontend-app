apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: social-network-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
      - name: frontend
        image: socialworky/worky-frontend-dev:5be76a247c23378f017d95cd069bc2ac16527edd
        ports:
        - containerPort: 80