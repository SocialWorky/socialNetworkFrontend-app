apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: social-network-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
      - name: frontend
        image: socialworky/worky-frontend-dev:fe6a937921fdd875d03b77ba22e83b3139a04e48
        ports:
        - containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
